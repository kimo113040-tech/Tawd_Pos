<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Tawd | طود - نظام الإدارة المتكامل</title>
    <style>
        /* ============================================================
           تنسيقات نظام طود Tawd (مدمجة)
           حقوق الملكية: شركة طود Tawd
           ============================================================ */
        :root {
            --primary: #D7263D;
            --primary-dark: #B01E30;
            --primary-light: #FCE8EB;
            --secondary: #1FA25C;
            --secondary-dark: #15804A;
            --accent: #1F6FEB;
            --accent-light: #E4EEFD;
            --bg: #F5F7FA;
            --surface: #FFFFFF;
            --text: #1A1A2E;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 40px rgba(0,0,0,0.12);
            --shadow-lg: 0 12px 60px rgba(0,0,0,0.15);
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 270px;
            --header-height: 70px;
        }

        [data-theme="dark"] {
            --bg: #0F1219;
            --surface: #1A1F2E;
            --text: #F1F3F5;
            --text-muted: #9CA3AF;
            --border: #2D3346;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 40px rgba(0,0,0,0.5);
            --shadow-lg: 0 12px 60px rgba(0,0,0,0.6);
            --primary-light: #3A1A24;
            --accent-light: #1A2444;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            background:var(--bg);
            color:var(--text);
            font-family:var(--font);
            line-height:1.6;
            min-height:100vh;
            transition:background var(--transition), color var(--transition);
            overflow-x:hidden;
        }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--primary); border-radius:10px; }

        a { color:var(--accent); text-decoration:none; transition:var(--transition); }
        a:hover { opacity:0.8; }

        button, input, select, textarea { font:inherit; outline:none; }
        button { cursor:pointer; border:none; background:none; transition:all var(--transition); }
        button:active { transform:scale(0.96); }

        .container { max-width:1400px; margin:0 auto; padding:0 24px; }
        .flex { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .flex-col { flex-direction:column; align-items:stretch; }
        .flex-center { justify-content:center; }
        .flex-between { justify-content:space-between; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
        .gap { gap:12px; }
        .mt-1 { margin-top:8px; }
        .mt-2 { margin-top:16px; }
        .mt-3 { margin-top:24px; }
        .mt-4 { margin-top:32px; }
        .mb-1 { margin-bottom:8px; }
        .mb-2 { margin-bottom:16px; }
        .p-1 { padding:8px; }
        .p-2 { padding:16px; }
        .p-3 { padding:24px; }
        .text-center { text-align:center; }
        .text-muted { color:var(--text-muted); }
        .text-sm { font-size:0.875rem; }
        .text-lg { font-size:1.25rem; }
        .text-xl { font-size:1.5rem; }
        .text-2xl { font-size:2rem; }
        .fw-bold { font-weight:700; }
        .w-full { width:100%; }
        .hidden { display:none !important; }

        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes slideIn {
            from { transform:translateX(100%); opacity:0; }
            to { transform:translateX(0); opacity:1; }
        }
        .animate-in { animation:fadeInUp 0.5s ease forwards; }
        .slide-in { animation:slideIn 0.3s ease forwards; }

        .card {
            background:var(--surface);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            padding:24px;
            border:1px solid var(--border);
            transition:all var(--transition);
        }
        .card:hover { box-shadow:var(--shadow-hover); transform:translateY(-3px); }

        .btn {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
            padding:12px 28px;
            border-radius:var(--radius-sm);
            font-weight:600;
            font-size:0.95rem;
            background:var(--primary);
            color:#fff;
            border:1px solid transparent;
            transition:all var(--transition);
            min-height:48px;
            min-width:48px;
        }
        .btn:hover { opacity:0.9; transform:translateY(-2px); box-shadow:0 4px 20px rgba(215,38,61,0.35); }
        .btn:active { transform:scale(0.96); }
        .btn-secondary { background:var(--surface); color:var(--text); border-color:var(--border); }
        .btn-secondary:hover { background:var(--bg); box-shadow:var(--shadow); }
        .btn-success { background:var(--secondary); }
        .btn-success:hover { box-shadow:0 4px 20px rgba(31,162,92,0.35); }
        .btn-accent { background:var(--accent); }
        .btn-accent:hover { box-shadow:0 4px 20px rgba(31,111,235,0.35); }
        .btn-danger { background:#D7263D; }
        .btn-danger:hover { box-shadow:0 4px 20px rgba(215,38,61,0.35); }
        .btn-warning { background:#F59E0B; color:#fff; }
        .btn-sm { padding:6px 14px; font-size:0.8rem; min-height:36px; }
        .btn-lg { padding:14px 36px; font-size:1.05rem; min-height:56px; }
        .btn-block { width:100%; justify-content:center; }

        .input {
            width:100%;
            padding:12px 16px;
            border-radius:var(--radius-sm);
            border:2px solid var(--border);
            background:var(--bg);
            color:var(--text);
            transition:all var(--transition);
            font-size:0.95rem;
        }
        .input:focus {
            border-color:var(--primary);
            box-shadow:0 0 0 4px var(--primary-light);
            background:var(--surface);
        }
        .input::placeholder { color:var(--text-muted); }

        label { font-weight:600; display:block; margin-bottom:6px; color:var(--text-muted); font-size:0.9rem; }

        .badge {
            display:inline-block;
            padding:4px 14px;
            border-radius:50px;
            font-size:0.7rem;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:0.5px;
            background:var(--border);
            color:var(--text-muted);
        }
        .badge-success { background:var(--secondary); color:#fff; }
        .badge-danger { background:var(--primary); color:#fff; }
        .badge-warning { background:#F59E0B; color:#fff; }
        .badge-accent { background:var(--accent); color:#fff; }
        .badge-info { background:var(--accent); color:#fff; }

        .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:14px 16px; text-align:right; border-bottom:1px solid var(--border); }
        th { font-weight:700; color:var(--text-muted); font-size:0.8rem; text-transform:uppercase; letter-spacing:0.5px; background:var(--bg); }
        tr:hover td { background:var(--primary-light); }

        #toast-container {
            position:fixed;
            bottom:24px;
            right:24px;
            z-index:9999;
            display:flex;
            flex-direction:column;
            gap:10px;
            max-width:420px;
        }
        .toast {
            background:var(--surface);
            color:var(--text);
            padding:16px 24px;
            border-radius:var(--radius-sm);
            box-shadow:var(--shadow-lg);
            border-right:4px solid var(--primary);
            animation:slideIn 0.3s ease forwards;
            font-weight:500;
        }
        .toast-success { border-right-color:var(--secondary); }
        .toast-error { border-right-color:var(--primary); }
        .toast-warning { border-right-color:#F59E0B; }
        .toast-info { border-right-color:var(--accent); }

        .sidebar {
            position:fixed;
            top:0;
            right:0;
            width:var(--sidebar-width);
            height:100vh;
            background:var(--surface);
            border-left:1px solid var(--border);
            padding:20px 16px;
            overflow-y:auto;
            z-index:1000;
            transition:all var(--transition);
            box-shadow:var(--shadow-lg);
        }
        .sidebar .logo {
            font-size:1.8rem;
            font-weight:800;
            color:var(--primary);
            padding:8px 12px;
            margin-bottom:24px;
            display:flex;
            align-items:center;
            gap:12px;
        }
        .sidebar .logo span { color:var(--text); font-weight:300; }
        .sidebar .logo small { font-size:0.6rem; font-weight:400; color:var(--text-muted); }
        .sidebar .nav-item {
            display:flex;
            align-items:center;
            gap:14px;
            padding:12px 16px;
            border-radius:var(--radius-sm);
            color:var(--text-muted);
            font-weight:500;
            transition:all var(--transition);
            cursor:pointer;
            margin-bottom:2px;
        }
        .sidebar .nav-item:hover { background:var(--primary-light); color:var(--primary); }
        .sidebar .nav-item.active { background:var(--primary); color:#fff; }
        .sidebar .nav-item .icon { font-size:1.2rem; width:28px; text-align:center; }
        .sidebar .nav-divider { border-top:1px solid var(--border); margin:16px 0; }
        .sidebar .user-info {
            padding:16px 12px;
            border-radius:var(--radius-sm);
            background:var(--bg);
            margin-top:auto;
        }
        .sidebar .user-info .name { font-weight:700; font-size:1rem; }
        .sidebar .user-info .role { font-size:0.8rem; color:var(--text-muted); }

        .main-content {
            margin-right:var(--sidebar-width);
            min-height:100vh;
            padding:24px;
        }
        .main-content .header {
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:16px 24px;
            background:var(--surface);
            border-radius:var(--radius);
            border:1px solid var(--border);
            margin-bottom:24px;
            box-shadow:var(--shadow);
            min-height:var(--header-height);
        }
        .main-content .header h1 { font-size:1.4rem; font-weight:700; }
        .main-content .header .actions { display:flex; align-items:center; gap:12px; }

        .stat-card {
            background:var(--surface);
            border-radius:var(--radius);
            padding:20px 24px;
            border:1px solid var(--border);
            box-shadow:var(--shadow);
            transition:all var(--transition);
            position:relative;
            overflow:hidden;
        }
        .stat-card::before {
            content:'';
            position:absolute;
            top:0;
            right:0;
            width:4px;
            height:100%;
            background:var(--primary);
        }
        .stat-card:hover { box-shadow:var(--shadow-hover); transform:translateY(-4px); }
        .stat-card .stat-icon { font-size:2rem; margin-bottom:4px; }
        .stat-card .stat-value { font-size:1.8rem; font-weight:800; color:var(--text); }
        .stat-card .stat-label { color:var(--text-muted); font-size:0.9rem; font-weight:500; }

        .modal-overlay {
            position:fixed;
            top:0;
            left:0;
            right:0;
            bottom:0;
            background:rgba(0,0,0,0.5);
            z-index:9999;
            display:flex;
            align-items:center;
            justify-content:center;
            animation:fadeInUp 0.2s ease;
        }
        .modal-overlay .modal-content {
            background:var(--surface);
            border-radius:var(--radius);
            padding:32px;
            max-width:500px;
            width:95%;
            max-height:90vh;
            overflow-y:auto;
            box-shadow:var(--shadow-lg);
        }
        .modal-overlay .modal-content .close-btn {
            float:left;
            font-size:1.8rem;
            color:var(--text-muted);
            cursor:pointer;
            transition:var(--transition);
        }
        .modal-overlay .modal-content .close-btn:hover { color:var(--primary); }

        .menu-toggle {
            display:none;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            padding:8px 14px;
            font-size:1.5rem;
        }

        /* POS Styles */
        .pos-layout {
            display:grid;
            grid-template-columns:1fr 420px;
            gap:24px;
            margin-top:16px;
        }
        @media (max-width:1100px) {
            .pos-layout { grid-template-columns:1fr; }
            .pos-cart-panel { position:relative; top:0; max-height:none; }
        }
        @media (max-width:480px) {
            .pos-products-grid { grid-template-columns:repeat(2,1fr); }
            .pos-toolbar { flex-direction:column; align-items:stretch; }
            .pos-toolbar .barcode-input { width:100%; }
        }

        .category-tabs {
            display:flex;
            gap:8px;
            flex-wrap:wrap;
            margin-bottom:16px;
            padding:8px 4px;
            overflow-x:auto;
            -webkit-overflow-scrolling:touch;
        }
        .category-tabs .cat-btn {
            padding:8px 20px;
            border-radius:30px;
            font-weight:600;
            font-size:0.85rem;
            border:2px solid var(--border);
            background:var(--surface);
            color:var(--text-muted);
            transition:all var(--transition);
            white-space:nowrap;
            flex-shrink:0;
        }
        .category-tabs .cat-btn:hover { border-color:var(--primary); color:var(--primary); }
        .category-tabs .cat-btn.active { border-color:var(--primary); background:var(--primary); color:#fff; }

        .pos-products-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(155px,1fr));
            gap:14px;
        }
        @media (max-width:600px) {
            .pos-products-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
        }

        .pos-product-card {
            background:var(--surface);
            border:2px solid var(--border);
            border-radius:var(--radius-sm);
            padding:12px 8px;
            text-align:center;
            cursor:pointer;
            transition:all var(--transition);
            position:relative;
            min-height:160px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
        }
        .pos-product-card:hover {
            border-color:var(--primary);
            transform:translateY(-4px);
            box-shadow:var(--shadow-hover);
        }
        .pos-product-card .product-icon { font-size:2rem; margin-bottom:4px; width:60px; height:60px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
        .pos-product-card .product-icon img { width:100%; height:100%; object-fit:cover; }
        .pos-product-card .product-name { font-weight:600; font-size:0.9rem; line-height:1.2; margin-top:4px; flex:1; display:flex; align-items:center; }
        .pos-product-card .product-price { color:var(--primary); font-weight:700; font-size:1.05rem; margin-top:2px; }
        .pos-product-card .product-barcode { font-size:0.5rem; color:var(--text-muted); background:var(--bg); padding:1px 6px; border-radius:4px; margin-top:4px; direction:ltr; font-family:monospace; width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .pos-product-card .product-stock { font-size:0.6rem; color:var(--text-muted); position:absolute; top:4px; left:6px; background:var(--surface); padding:0 6px; border-radius:10px; }
        .pos-product-card .product-stock.low { color:var(--primary); font-weight:700; }
        .pos-product-card .quick-add { margin-top:6px; display:flex; gap:4px; justify-content:center; }
        .pos-product-card .quick-add button { width:28px; height:28px; border-radius:50%; background:var(--accent-light); color:var(--accent); font-weight:700; font-size:0.9rem; transition:all var(--transition); }
        .pos-product-card .quick-add button:hover { background:var(--accent); color:#fff; }

        .pos-cart-panel {
            background:var(--surface);
            border-radius:var(--radius);
            padding:20px;
            border:1px solid var(--border);
            box-shadow:var(--shadow);
            position:sticky;
            top:24px;
            max-height:calc(100vh - 140px);
            overflow-y:auto;
            display:flex;
            flex-direction:column;
        }
        .pos-cart-panel .cart-header { display:flex; justify-content:space-between; align-items:center; padding-bottom:12px; border-bottom:2px solid var(--border); margin-bottom:12px; flex-wrap:wrap; gap:8px; }
        .pos-cart-panel .cart-header h3 { font-size:1.1rem; }
        .pos-cart-panel .cart-items { flex:1; overflow-y:auto; min-height:80px; max-height:280px; }
        .pos-cart-panel .cart-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:4px; }
        .pos-cart-panel .cart-item:last-child { border-bottom:none; }
        .pos-cart-panel .cart-item .item-info { flex:1; min-width:60px; }
        .pos-cart-panel .cart-item .item-name { font-weight:600; font-size:0.85rem; }
        .pos-cart-panel .cart-item .item-price { font-size:0.75rem; color:var(--text-muted); }
        .pos-cart-panel .cart-item .item-qty { display:flex; align-items:center; gap:4px; }
        .pos-cart-panel .cart-item .item-qty button { width:26px; height:26px; border-radius:50%; background:var(--bg); font-weight:700; font-size:0.9rem; transition:all var(--transition); }
        .pos-cart-panel .cart-item .item-qty button:hover { background:var(--primary-light); }
        .pos-cart-panel .cart-item .item-total { font-weight:700; font-size:0.9rem; min-width:55px; text-align:left; }
        .pos-cart-panel .cart-item .item-remove { color:var(--primary); font-weight:700; padding:0 4px; font-size:1rem; opacity:0.5; }
        .pos-cart-panel .cart-item .item-remove:hover { opacity:1; }
        .pos-cart-panel .cart-summary { border-top:2px solid var(--border); padding-top:12px; margin-top:8px; }
        .pos-cart-panel .cart-summary .summary-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.9rem; }
        .pos-cart-panel .cart-summary .summary-row.total { font-size:1.15rem; font-weight:700; border-top:2px solid var(--primary); padding-top:8px; margin-top:4px; color:var(--primary); }
        .pos-cart-panel .cart-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
        .pos-cart-panel .cart-actions .btn { min-height:44px; }

        .pos-toolbar {
            display:flex;
            flex-wrap:wrap;
            gap:12px;
            align-items:center;
            padding:12px 16px;
            background:var(--surface);
            border-radius:var(--radius-sm);
            border:1px solid var(--border);
            margin-bottom:12px;
        }
        .pos-toolbar .order-type-btn { padding:6px 16px; border-radius:30px; font-weight:600; font-size:0.85rem; border:2px solid var(--border); transition:all var(--transition); }
        .pos-toolbar .order-type-btn.active { border-color:var(--primary); background:var(--primary); color:#fff; }
        .pos-toolbar .order-type-btn:not(.active):hover { border-color:var(--primary); color:var(--primary); }
        .pos-toolbar .barcode-input { width:180px; padding:6px 12px; border-radius:30px; border:2px solid var(--border); background:var(--bg); font-family:monospace; font-size:0.9rem; direction:ltr; text-align:center; }
        .pos-toolbar .barcode-input:focus { border-color:var(--accent); }

        .customer-search { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .customer-search .input { flex:1; min-width:200px; }

        @media (max-width:768px) {
            .sidebar { transform:translateX(100%); width:300px; }
            .sidebar.open { transform:translateX(0); }
            .main-content { margin-right:0; padding:12px; }
            .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; }
            .main-content .header { flex-direction:column; gap:12px; align-items:stretch; }
            .main-content .header .actions { flex-wrap:wrap; justify-content:center; }
            .menu-toggle { display:flex !important; }
        }

        @media print {
            .sidebar, .header .actions, .menu-toggle { display:none !important; }
            .main-content { margin:0; padding:0; }
            .card { box-shadow:none !important; border:1px solid #ddd; }
            body { background:#fff; }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">طود <small>TAWD</small></div>
        <div id="sidebarNav"></div>
        <div class="nav-divider"></div>
        <div class="user-info" id="sidebarUser"></div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="header">
            <div class="flex" style="gap:12px;">
                <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
                <h1 id="pageTitle">لوحة التحكم</h1>
            </div>
            <div class="actions">
                <button class="btn btn-secondary btn-sm" onclick="setTheme('light')">☀️</button>
                <button class="btn btn-secondary btn-sm" onclick="setTheme('dark')">🌙</button>
                <button class="btn btn-danger btn-sm" onclick="logout()">🚪 خروج</button>
            </div>
        </div>
        <div id="app"></div>
    </main>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <script>
        // ================================================================
        //  حقوق الملكية: شركة طود Tawd | التصميم: Karim Elgioushy
        //  الإصدار النهائي - جميع المشاكل محلولة
        // ================================================================

        // ============================
        //  إعدادات الـ API
        // ============================
        const API_BASE = 'https://tawdpos.infinityfree.io/api/';
        console.log('✅ نظام طود جاهز للعمل');

        // ============================
        //  دوال الاتصال الأساسية
        // ============================
        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include'
            };
            if (data) options.body = JSON.stringify(data);
            try {
                const response = await fetch(API_BASE + endpoint, options);
                const result = await response.json();

        window.addToCart = function(id, name, price) {
            const cart = window.STATE.cart || [];
            const existing = cart.find(i => i.productId === id);
            if (existing) existing.qty += 1;
            else cart.push({ productId: id, name, price, qty: 1 });
            window.STATE.cart = cart;
            renderView(location.hash.slice(1));
        };

        window.removeFromCart = function(idx) {
            window.STATE.cart.splice(idx, 1);
            renderView(location.hash.slice(1));
        };

        window.updateCartQty = function(idx, delta) {
            const cart = window.STATE.cart || [];
            if (cart[idx]) {
                cart[idx].qty = Math.max(1, cart[idx].qty + delta);
                if (cart[idx].qty === 0) cart.splice(idx, 1);
                window.STATE.cart = cart;
                renderView(location.hash.slice(1));
            }
        };

            if (!code || code.length < 3) { showToast('⚠️ أدخل باركود صحيح', 'warning'); return; }
            loadProducts().then(products => {
                const product = products.find(p => p.barcode === code);
                if (product) {
                    addToCart(product.id, product.name, product.price);
                    document.getElementById('barcodeScanner').value = '';
                } else {
                    showToast('⚠️ منتج غير موجود', 'error');
                }
            });
        };

        window.confirmOrder = async function() {
            const cart = window.STATE.cart || [];
            if (cart.length === 0) { showToast('⚠️ السلة فارغة', 'error'); return; }
            if (!window.STATE.activeShift) { showToast('⚠️ يجب فتح شيفت أولاً', 'warning'); return; }
            
            const user = window.STATE.currentUser;
            const orderType = window.STATE.orderType || 'takeaway';
            const paymentMethod = document.getElementById('paymentMethod')?.value || 'cash';
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const deliveryFee = orderType === 'delivery' ? 15 : 0;
            const tax = subtotal * 0.14;
            const total = subtotal + tax + deliveryFee;
            const customer = window.STATE.selectedCustomer;

            const orderData = {
                customerId: customer ? customer.phone : null,
                customerName: customer ? customer.customer_name || customer.customerName : 'زائر',
                customerPhone: customer ? customer.phone : null,
                type: orderType,
                items: cart.map(i => ({ productId: i.productId, name: i.name, qty: i.qty, price: i.price, notes: '' })),
                subtotal, discount: 0, deliveryFee, tax, total,
                paymentMethod,
                shiftId: window.STATE.activeShift
            };

            const result = await createOrder(orderData);
            if (result) {
                window.STATE.cart = [];
                window.STATE.selectedCustomer = null;
                router();
            }
        };

        window.sendResetLink = async function() {
            const phone = document.getElementById('resetPhone').value.trim();
            const resultDiv = document.getElementById('resetResult');
            
            if (!phone || phone.length < 10) {
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '<p style="color:var(--primary);">⚠️ يرجى إدخال رقم هاتف صحيح</p>';
                return;

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p style="color:var(--accent);">⏳ جاري البحث عن الحساب...</p>';

            try {
                const response = await fetch(API_BASE + 'auth.php?action=resetPassword', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ phone: phone })
                });
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <p style="color:var(--secondary);">✅ ${result.message}</p>
                        <p class="text-sm text-muted">كلمة المرور الجديدة: <strong>${result.newPassword}</strong></p>
                        <p class="text-sm text-muted">يرجى تسجيل الدخول بها</p>
                        <button class="btn btn-sm btn-primary mt-1" onclick="closeForgotPassword()">حسناً</button>
                    `;
                    showToast('✅ تم إعادة تعيين كلمة المرور', 'success');
                } else {
                    resultDiv.innerHTML = `<p style="color:var(--primary);">⚠️ ${result.error}</p>`;
                }
            } catch (e) {
                resultDiv.innerHTML = `<p style="color:var(--primary);">⚠️ حدث خطأ: ${e.message}</p>`;
                console.error('Reset password error:', e);
            }
        };

            const user = window.STATE.currentUser;

            if (!role && hash !== '/login' && hash !== '/register') { navigate('/login'); return; }
            if (role === 'owner' && !hash.startsWith('/owner')) { navigate('/owner/dashboard'); return; }
            if (role === 'business' && !hash.startsWith('/business')) { navigate('/business/pos'); return; }
            if (role === 'driver' && !hash.startsWith('/driver')) { navigate('/driver/orders'); return; }
            if (role === 'customer' && !hash.startsWith('/customer')) { navigate('/customer/home'); return; }
            renderView(hash);
            updateSidebar(hash);
        }

                <div class="card mt-2 animate-in" style="max-width:500px;margin:0 auto;">
                    <h3>⚙️ الإعدادات</h3>
                    <div class="mt-2">
                        <label>الوضع</label>
                        <div class="flex" style="gap:12px;">
                            <button class="btn btn-sm ${window.STATE.theme === 'light' ? 'btn-accent' : 'btn-secondary'}" onclick="setTheme('light')">☀️ نهاري</button>
                            <button class="btn btn-sm ${window.STATE.theme === 'dark' ? 'btn-accent' : 'btn-secondary'}" onclick="setTheme('dark')">🌙 ليلي</button>
                        </div>
                    </div>
                    <button class="btn btn-secondary btn-block mt-2" onclick="navigate('/customer/home')">⬅️ رجوع</button>
                </div>
                `;
            }
            
            else if (view.startsWith('/customer/shop/')) {
                return `
                <div class="card mt-2 animate-in">
                    <h3>🏪 المحل</h3>
                    <p class="text-muted">تفاصيل المحل</p>
                    <button class="btn btn-secondary mt-2" onclick="navigate('/customer/home')">⬅️ رجوع</button>
                </div>
                `;
            }
            
            else return `<div class="card mt-2"><h2>صفحة غير معروفة</h2></div>`;
        }

        // -------- دوال العميل المساعدة --------
        window.customerAddToCart = function(id, name, price) {
            const cart = window.STATE.cart || [];
            const existing = cart.find(i => i.productId === id);
            if (existing) existing.qty += 1;
            else cart.push({ productId: id, name, price, qty: 1 });
            window.STATE.cart = cart;
            showToast('✅ تمت الإضافة', 'success');
            renderView(location.hash.slice(1));
        };

        window.customerRemoveFromCart = function(idx) {
            window.STATE.cart.splice(idx, 1);
            renderView(location.hash.slice(1));
        };

        window.customerPlaceOrder = async function() {
            const cart = window.STATE.cart || [];
            if (cart.length === 0) { showToast('⚠️ السلة فارغة', 'error'); return; }
            const user = window.STATE.currentUser;
            
            const businesses = await loadBusinessesList();
            const biz = businesses.find(b => b.status === 'active');
            if (!biz) { showToast('⚠️ لا يوجد محلات متاحة', 'error'); return; }
            
            const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
            const tax = subtotal * 0.14;
            const total = subtotal + tax;
            
            const orderData = {
                businessId: biz.id,
                customerId: user.id,
                customerName: user.name,
                customerPhone: user.phone,
                type: 'delivery',
                items: cart.map(i => ({ productId: i.productId, name: i.name, qty: i.qty, price: i.price, notes: '' })),
                subtotal, discount: 0, deliveryFee: 15, tax, total,
                paymentMethod: 'cash'
            };
            
            const result = await createOrder(orderData);
            if (result) {
                window.STATE.cart = [];
                showToast('✅ تم إرسال الطلب', 'success');
                navigate('/customer/orders');
            }
        };

        window.reorder = function(orderId) {
            loadOrders().then(orders => {
                const order = orders.find(o => o.id === orderId);
                if (order) {
                    window.STATE.cart = JSON.parse(order.items).map(i => ({ productId: i.productId, name: i.name, price: i.price, qty: i.qty }));
                    navigate('/customer/cart');
                    showToast('🔄 تم إعادة الطلب', 'success');
                }
            });
        };

        window.showTracking = function(orderId) {
            const orders = loadOrders();
            orders.then(allOrders => {
                const order = allOrders.find(o => o.id === orderId);
                if (!order || !order.tracking) {
                    showToast('لا توجد بيانات تتبع', 'warning');
                    return;
                }
                const tracking = JSON.parse(order.tracking);
                if (!tracking || tracking.length === 0) {
                    showToast('لا توجد بيانات تتبع', 'warning');
                    return;
                }
                
                const steps = [
                    { status: 'pending', label: '📝 تم الاستلام' },
                    { status: 'preparing', label: '⏳ جاري التحضير' },
                    { status: 'ready', label: '✅ جاهز' },
                    { status: 'out_for_delivery', label: '🚚 خرج للتوصيل' },
                    { status: 'delivered', label: '🏠 تم التوصيل' }
                ];
                
                let html = `<div style="padding:16px;"><h3>📋 تتبع الطلب #${orderId.slice(0,8)}</h3><div style="display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;padding:16px;">`;
                
                steps.forEach((step, idx) => {
                    const isCompleted = tracking.some(t => t.status === step.status);
                    html += `
                        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
                            <div style="width:40px;height:40px;border-radius:50%;background:${isCompleted ? '#1FA25C' : '#eee'};color:${isCompleted ? '#fff' : '#999'};display:flex;align-items:center;justify-content:center;font-weight:700;">${idx + 1}</div>
                            <div style="font-size:0.7rem;text-align:center;color:${isCompleted ? 'var(--text)' : 'var(--text-muted)'};">${step.label}</div>
                        </div>
                    `;
                    if (idx < steps.length - 1) {
                        html += `<div style="width:40px;height:2px;background:${isCompleted ? '#1FA25C' : '#eee'};"></div>`;
                    }
                });
                
                html += `</div><div class="text-sm text-muted mt-2">آخر تحديث: ${formatDate(tracking[tracking.length-1]?.timestamp || new Date())}</div></div>`;
                
                const win = window.open('', '_blank', 'width=500,height=400');
                win.document.write(`
                    <html><head><title>تتبع الطلب</title>
                    <style>body{font-family:sans-serif;padding:20px;direction:rtl;background:#fff;}</style>
                    </head><body>${html}
                    <button onclick="window.close()" style="margin-top:16px;padding:8px 24px;background:#D7263D;color:#fff;border:none;border-radius:8px;cursor:pointer;">إغلاق</button>
                    </body></html>
                `);
                win.document.close();
            });
        };

        // ============================
        //  دالة العرض الرئيسية
        // ============================
        function renderView(view) {
            const app = document.getElementById('app');
            const user = window.STATE.currentUser;
            const role = user ? user.role : null;

            if (!user && view !== '/login' && view !== '/register') {
                app.innerHTML = renderLogin();
                bindEvents();
                return;
            }
            if (view === '/login') {
                app.innerHTML = renderLogin();
                bindEvents();
                return;
            }
            if (view === '/register') {
                app.innerHTML = renderRegister();
                bindEvents();
                return;
            }

            if (role === 'owner') app.innerHTML = renderOwner(view);
            else if (role === 'business') app.innerHTML = renderBusiness(view);
            else if (role === 'driver') app.innerHTML = renderDriver(view);
            else if (role === 'customer') app.innerHTML = renderCustomer(view);
            else app.innerHTML = `<div class="card mt-2"><h2>صفحة غير موجودة</h2></div>`;
            bindEvents();
        }

        // ============================
        //  ربط الأحداث
        // ============================
        function bindEvents() {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const identifier = document.getElementById('loginIdentifier').value.trim();
                    const password = document.getElementById('loginPassword').value;
                    await login(identifier, password);
                });
            }
            const regForm = document.getElementById('registerForm');
            if (regForm) {
                const roleSelect = document.getElementById('regRole');
                const bizWrap = document.getElementById('regBusinessTypeWrap');
                if (roleSelect) {
                    roleSelect.addEventListener('change', () => {
                        bizWrap.style.display = roleSelect.value === 'business' ? 'block' : 'none';
                    });
                }
                regForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const role = document.getElementById('regRole').value;
                    const name = document.getElementById('regName').value.trim();
                    const phone = document.getElementById('regPhone').value.trim();
                    const email = document.getElementById('regEmail').value.trim() || null;
                    const password = document.getElementById('regPassword').value;
                    const businessType = document.getElementById('regBusinessType')?.value || null;
                    if (!phone.match(/01[0-2,5]{1}[0-9]{8}/)) {
                        showToast('رقم هاتف غير صحيح', 'error');
                        return;
                    }
                    await register(role, { name, phone, email, password, businessType });
                });
            }
        }

        // ============================
        //  دوال الـ UI المساعدة
        // ============================
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = 'toast';
            if (type === 'success') el.classList.add('toast-success');
            if (type === 'error') el.classList.add('toast-error');
            if (type === 'warning') el.classList.add('toast-warning');
            if (type === 'info') el.classList.add('toast-info');
            el.textContent = msg;
            c.appendChild(el);
            setTimeout(() => { el.remove(); }, 3500);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            window.STATE.theme = theme;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function updateSidebar(view) {
            const nav = document.getElementById('sidebarNav');
            const user = window.STATE.currentUser;
            const role = user ? user.role : null;
            let items = [];
            
            if (role === 'owner') {
                items = [
                    { label: '📊 لوحة التحكم', path: '/owner/dashboard' },
                    { label: '✅ طلبات التفعيل', path: '/owner/activations' },
                    { label: '🏪 المحلات', path: '/owner/businesses' },
                    { label: '🚗 السائقين', path: '/owner/drivers' },
                    { label: '⚙️ الإعدادات', path: '/owner/settings' },
                    { label: '💾 البيانات', path: '/owner/data' }
                ];
            } else if (role === 'business') {
                items = [
                    { label: '🛒 الكاشير', path: '/business/pos' },
                    { label: '📦 الطلبات', path: '/business/orders' },
                    { label: '📦 المخزون', path: '/business/inventory' },
                    { label: '📊 جرد المخزن', path: '/business/stocktake' },
                    { label: '🔄 الشيفتات', path: '/business/shifts' },
                    { label: '📦 المنتجات', path: '/business/products' },
                    { label: '🧪 الريسبي', path: '/business/recipes' },
                    { label: '🪑 الطاولات', path: '/business/tables' },
                    { label: '👥 العملاء', path: '/business/customers' },
                    { label: '🏷️ الموردون', path: '/business/suppliers' },
                    { label: '👔 الموظفون', path: '/business/employees' },
                    { label: '💰 المرتبات', path: '/business/payroll' },
                    { label: '📈 التقارير', path: '/business/reports' },
                    { label: '📊 الحسابات', path: '/business/accounts' },
                    { label: '📊 مؤشرات الأداء', path: '/business/kpi' },
                    { label: '⚙️ إعدادات المحل', path: '/business/settings' }
                ];
            } else if (role === 'driver') {
                items = [
                    { label: '📋 الطلبات', path: '/driver/orders' },
                    { label: '💰 الأرباح', path: '/driver/earnings' },
                    { label: '⚙️ الإعدادات', path: '/driver/settings' }
                ];
            } else if (role === 'customer') {
                items = [
                    { label: '🏠 الرئيسية', path: '/customer/home' },
                    { label: '🛒 طلباتي', path: '/customer/orders' },
                    { label: '🛍️ السلة', path: '/customer/cart' },
                    { label: '👤 حسابي', path: '/customer/profile' },
                    { label: '⚙️ الإعدادات', path: '/customer/settings' }
                ];
            }
            
            nav.innerHTML = items.map(item =>
                `<div class="nav-item ${view === item.path ? 'active' : ''}" onclick="navigate('${item.path}')">
                    <span class="icon">${item.label.split(' ')[0]}</span>
                    <span>${item.label.split(' ').slice(1).join(' ')}</span>
                </div>`
            ).join('');

            const userInfo = document.getElementById('sidebarUser');
            if (user && user.role !== 'owner') {
                const roleNames = { business: '🏪 محل', driver: '🚗 سائق', customer: '👤 عميل' };
                userInfo.innerHTML = `
                    <div class="name">${user.name}</div>
                    <div class="role">${roleNames[user.role] || user.role}</div>
                    ${user.work_number ? `<div style="font-size:0.75rem;color:var(--text-muted);">رقم العمل: ${user.work_number}</div>` : ''}
                `;
            } else if (user && user.role === 'owner') {
                userInfo.innerHTML = `<div class="name">👑 مدير النظام</div><div class="role">صلاحية كاملة</div>`;
            }
        }

        // ============================
        //  الحالة العامة
        // ============================
        window.STATE = {
            currentUser: null,
            currentRole: null,
            theme: 'light',
            cart: [],
            activeShift: null,
            selectedCustomer: null,
            orderType: 'takeaway'
        };

        // ============================
        //  تهيئة النظام
        // ============================
        window.addEventListener('hashchange', router);
        window.addEventListener('load', () => {
            if (restoreSession()) {
                const user = window.STATE.currentUser;
                if (user.role === 'owner') navigate('/owner/dashboard');
                else if (user.role === 'business') navigate('/business/pos');
                else if (user.role === 'driver') navigate('/driver/orders');
                else navigate('/customer/home');
            } else {
                if (!location.hash) navigate('/login');
                else router();
            }
        });

        // تعريض الدوال العامة
        window.navigate = navigate;
        window.showToast = showToast;
        window.setTheme = setTheme;
        window.toggleSidebar = toggleSidebar;
        window.renderView = renderView;
        window.router = router;
        window.updateSidebar = updateSidebar;
        window.API_BASE = API_BASE;
        window.closeForgotPassword = closeForgotPassword;

        // إغلاق المودال عند النقر خارج المحتوى
        document.addEventListener('click', function(e) {
            const modal = document.getElementById('forgotPasswordModal');
            if (e.target === modal) {
                closeForgotPassword();
            }
        });

        console.log('✅ نظام طود جاهز للعمل');
        console.log('👤 المصمم: Elgioushy | كلمة المرور: 11Tawd2026@');
    </script>
</body>
